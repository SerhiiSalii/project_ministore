<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a href="#" class="header__logo logo">
            <img src="../img/MiniStore_logo.png" alt="" class="header__img">
        </a>
        <nav class="navigation">
            <ul class="navigation__menu">
                <li class="navigation__item"><a href="#" class="navigation__link">home</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">pages</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">about</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">blogs</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">contact</a></li>
            </ul>
        </nav>
        <div class="header__icons">
            <img src="../icons/glass.svg" alt="#">
            <img src="../icons/person.svg" alt="#">
            <img src="../icons/cart.svg" alt="#">
        </div>
    </header>
    <main>
        <div class="top-section">
            <h1 class="title-h1">Checkout</h1>
            <div class="top-section__breadcrumbs">
                <a class="top-section__link" href="/">Home</a>
                <p class="top-section__current-page">Checkout</p>
            </div>
        </div>
        <section class="checkout">
            <div class="checkout__container container">
                <div class="billing-block">
                    <h3 class="title-h3">
                        Billing Details
                    </h3>
                    <form action="#" method="post">
                        <div class="">
                            <label>
                                First name *
                                <input type="text" name="first_name" required>
                            </label>
                        </div>
                        <div class="div">
                            <label>
                                Last name *
                                <input type="text" name="last_name" disabled>
                            </label>
                        </div>
                        <div class="">
                            <label>
                                Company name (optional)
                                <input type="text" name="company_name">
                            </label>
                        </div>
                        <label>
                            Country / Region *
                            <input type="text" name="country_region">
                        </label>
                        <label>
                            Street address *
                            <input type="text" name="adress">
                            <input type="text" name="appartmants">
                        </label>
                        <label>
                            Town / City *
                            <input type="text" name="town_city">
                        </label>
                        <label>
                            State *
                            <input type="text" name="state">
                        </label>
                        <label>
                            ZIP Code *
                            <input type="text" name="zip_code">
                        </label>
                        <label>
                            Phone *
                            <input type="tel" name="phone">
                        </label>
                        <label>
                            Email adress *
                            <input type="email" name="email_adress">
                        </label>
                    </form>
                </div>
                <div class="additional-block">
                    <h3 class="title-h3">
                        Additional Information
                    </h3>
                    <label>
                            Order notes (optional)
                            <input type="text" name="order_notes">
                    </label>
                </div>
            </div>
            <div class="cart-block container">
                <div class="">
                    <label>
                        <input type="radio" name="paymant" value="direct_bank_transfer" checked>
                        Direct bank transfer
                    </label>
                    <label>
                        <input type="radio" name="paymant" value="check_payments">
                        Check payments
                    </label>
                    <label>
                        <input type="radio" name="paymant" value="cash">
                        Cash on delivery
                    </label>
                    <label>
                        <input type="radio" name="paymant" value="paypal">
                        PayPal
                    </label>
                </div>
                <button class="btn" type="submit">Place an order</button>
            </div>
        </section>
    </main>
</body>
</html>
