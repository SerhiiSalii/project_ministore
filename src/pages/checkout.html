<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a href="#" class="header__logo logo">
            <img src="../img/MiniStore_logo.png" alt="" class="header__img">
        </a>
        <nav class="navigation">
            <ul class="navigation__menu">
                <li class="navigation__item"><a href="#" class="navigation__link">home</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">pages</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">about</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">blogs</a></li>
                <li class="navigation__item"><a href="#" class="navigation__link">contact</a></li>
            </ul>
        </nav>
        <div class="header__icons">
            <img src="../icons/glass.svg" alt="#">
            <img src="../icons/person.svg" alt="#">
            <img src="../icons/cart.svg" alt="#">
        </div>
    </header>
    <main>
        <div class="top-section">
            <h1 class="title-h1">Checkout</h1>
            <div class="top-section__breadcrumbs">
                <a class="top-section__link" href="/">Home</a>
                <p class="top-section__current-page">Checkout</p>
            </div>
        </div>
        <section class="checkout">
            <div class="checkout__container container">
                <div class="checkout__billing-block">
                    <h3 class="checkout__title title-h3">
                        Billing Details
                    </h3>
                    <form action="#" method="post" id="checkout-form">
                        <div class="checkout__form-field form-field">
                            <label for="first-name" class="form-field__label">First name *</label>
                            <input type="text" class="form-field__input" name="first-name" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="last-name"  class="form-field__label">Last name *</label>
                            <input type="text" class="form-field__input" name="last_name" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="company-name" class="form-field__label">Company name (optional)</label>
                            <input type="text" class="form-field__input" name="company-name">
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="country" class="form-field__label">Country / Region *</label>
                            <input type="text" class="form-field__input" name="country" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="address" class="form-field__label">Street address *</label>
                            <input type="text" class="form-field__input" name="adress" required>
                            <input type="text" class="form-field__input" name="appartmants" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="city" class="form-field__label">Town / City *</label>
                            <input type="text" class="form-field__input" name="city" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="state" class="form-field__label">State *</label>
                            <input type="text" class="form-field__input" name="state" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="zip-code" class="form-field__label">ZIP Code *</label>
                            <input type="text" class="form-field__input" name="zip-code" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="phone" class="form-field__label">Phone *</label>
                            <input type="tel" class="form-field__input" name="phone" required>
                        </div>
                        <div class="checkout__form-field form-field">
                            <label for="email" class="form-field__label">Email adress *</label>
                            <input type="email" class="form-field__input" name="email" required>
                        </div>
                    </form>
                </div>
                <div class="checkout__additional-block">
                    <h3 class="checkout__title title-h3">
                        Additional Information
                    </h3>
                    <div class="form-field">
                        <label for="notes" class="form-field__label">Order notes (optional)</label>
                        <input type="text" class="form-field__input" placeholder="Notes about your order. Like special notes for delivery." name="notes">
                    </div>
                </div>
                <div class="checkout__cart-block">
                    <h3 class="checkout__title title-h3">Cart totals</h3>
                    <!-- <div class="cart"></div> -->
                    <div class="checkout__form-radio form-radio">
                        <input type="radio" name="paymant" value="direct_bank_transfer" checked>                        
                        <label for="radio">Direct bank transfer</label>

                        <input type="radio" name="paymant" value="check_payments">
                        <label for="radio">Check payments</label>

                        <input type="radio" name="paymant" value="cash">
                        <label for="radio">Cash on delivery</label>

                        <input type="radio" name="paymant" value="paypal">
                        <label for="radio"> PayPal</label>
                    </div>
                    <button class="btn" type="submit" form="checkout-form">Place an order</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
